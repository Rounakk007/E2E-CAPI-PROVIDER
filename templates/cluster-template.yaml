---
# Cluster API Cluster object
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: "${CLUSTER_NAME}"
  namespace: "${NAMESPACE}"
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - "${POD_CIDR}"
    services:
      cidrBlocks:
        - "${SERVICE_CIDR}"
  infrastructureRef:
    apiVersion: infrastructure.e2enetworks.com/v1beta1
    kind: E2ECluster
    name: "${CLUSTER_NAME}"
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: "${CLUSTER_NAME}-control-plane"
---
# E2E Infrastructure Cluster
apiVersion: infrastructure.e2enetworks.com/v1beta1
kind: E2ECluster
metadata:
  name: "${CLUSTER_NAME}"
  namespace: "${NAMESPACE}"
spec:
  region: "${E2E_REGION}"
  location: "${E2E_LOCATION}"
  network:
    vpcID: "${E2E_VPC_ID}"
  loadBalancer:
    securityGroupID: ${E2E_SECURITY_GROUP_ID}
---
# Control Plane
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: "${CLUSTER_NAME}-control-plane"
  namespace: "${NAMESPACE}"
spec:
  replicas: ${CONTROL_PLANE_MACHINE_COUNT}
  version: "${KUBERNETES_VERSION}"
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.e2enetworks.com/v1beta1
      kind: E2EMachineTemplate
      name: "${CLUSTER_NAME}-control-plane"
  kubeadmConfigSpec:
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: external
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: external
    clusterConfiguration:
      apiServer:
        extraArgs:
          cloud-provider: external
      controllerManager:
        extraArgs:
          cloud-provider: external
---
# Control Plane Machine Template
apiVersion: infrastructure.e2enetworks.com/v1beta1
kind: E2EMachineTemplate
metadata:
  name: "${CLUSTER_NAME}-control-plane"
  namespace: "${NAMESPACE}"
spec:
  template:
    spec:
      plan: "${E2E_CONTROL_PLANE_PLAN}"
      image: "${E2E_IMAGE}"
      location: "${E2E_LOCATION}"
      sshKeys:
        - "${E2E_SSH_KEYS}"
      enablePublicIP: true
---
# Worker MachineDeployment
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: "${CLUSTER_NAME}-md-0"
  namespace: "${NAMESPACE}"
spec:
  clusterName: "${CLUSTER_NAME}"
  replicas: ${WORKER_MACHINE_COUNT}
  selector:
    matchLabels: {}
  template:
    spec:
      clusterName: "${CLUSTER_NAME}"
      version: "${KUBERNETES_VERSION}"
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: "${CLUSTER_NAME}-md-0"
      infrastructureRef:
        apiVersion: infrastructure.e2enetworks.com/v1beta1
        kind: E2EMachineTemplate
        name: "${CLUSTER_NAME}-md-0"
---
# Worker Machine Template
apiVersion: infrastructure.e2enetworks.com/v1beta1
kind: E2EMachineTemplate
metadata:
  name: "${CLUSTER_NAME}-md-0"
  namespace: "${NAMESPACE}"
spec:
  template:
    spec:
      plan: "${E2E_WORKER_PLAN}"
      image: "${E2E_IMAGE}"
      location: "${E2E_LOCATION}"
      sshKeys:
        - "${E2E_SSH_KEYS}"
      enablePublicIP: true
---
# Worker Bootstrap Config
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: "${CLUSTER_NAME}-md-0"
  namespace: "${NAMESPACE}"
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            cloud-provider: external
