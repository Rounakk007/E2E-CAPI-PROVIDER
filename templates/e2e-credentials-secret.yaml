---
# Secret containing E2E Networks API credentials
# Create this in the cape2e-system namespace before deploying the provider
apiVersion: v1
kind: Secret
metadata:
  name: e2e-credentials
  namespace: cape2e-system
type: Opaque
stringData:
  api-key: "${E2E_API_KEY}"
  auth-token: "${E2E_AUTH_TOKEN}"
  project-id: "${E2E_PROJECT_ID}"
