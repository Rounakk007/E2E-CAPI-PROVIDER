---
# Grant capi-manager (CAPI core controller) permission to manage E2E infrastructure resources.
# CAPI's ClusterRole does not use aggregation, so a direct binding is required.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capi-manager-e2e-infra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: e2e-infrastructure-aggregate-role
subjects:
  - kind: ServiceAccount
    name: capi-manager
    namespace: capi-system
