---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
  # Core CAPI resources
  - apiGroups:
      - cluster.x-k8s.io
    resources:
      - clusters
      - clusters/status
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - cluster.x-k8s.io
    resources:
      - machines
      - machines/status
    verbs:
      - get
      - list
      - watch
  # E2E infrastructure resources
  - apiGroups:
      - infrastructure.e2enetworks.com
    resources:
      - e2eclusters
      - e2eclustertemplates
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - infrastructure.e2enetworks.com
    resources:
      - e2eclusters/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - infrastructure.e2enetworks.com
    resources:
      - e2eclusters/finalizers
    verbs:
      - update
  - apiGroups:
      - infrastructure.e2enetworks.com
    resources:
      - e2emachines
      - e2emachinetemplates
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - infrastructure.e2enetworks.com
    resources:
      - e2emachines/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - infrastructure.e2enetworks.com
    resources:
      - e2emachines/finalizers
    verbs:
      - update
  # Secrets for bootstrap data
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
---
# ClusterRole aggregation label so CAPI core controller can manage our resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capi-aggregated-manager-role
  labels:
    cluster.x-k8s.io/aggregate-to-manager: "true"
rules:
  - apiGroups:
      - infrastructure.e2enetworks.com
    resources:
      - e2eclusters
      - e2eclustertemplates
      - e2emachines
      - e2emachinetemplates
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - infrastructure.e2enetworks.com
    resources:
      - e2eclusters/status
      - e2emachines/status
    verbs:
      - get
      - patch
      - update
