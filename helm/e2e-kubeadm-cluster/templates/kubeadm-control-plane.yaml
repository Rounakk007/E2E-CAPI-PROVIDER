apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: {{ .Values.clusterName }}-control-plane
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.controlPlane.count }}
  version: {{ .Values.kubernetesVersion | quote }}
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.e2enetworks.com/v1beta1
      kind: E2EMachineTemplate
      name: {{ .Values.clusterName }}-control-plane
  kubeadmConfigSpec:
    initConfiguration:
      nodeRegistration: {}
    joinConfiguration:
      nodeRegistration: {}
