apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: {{ .Values.clusterName }}-md-0
  namespace: {{ .Values.namespace }}
spec:
  clusterName: {{ .Values.clusterName }}
  replicas: {{ .Values.worker.count }}
  selector:
    matchLabels: {}
  template:
    spec:
      clusterName: {{ .Values.clusterName }}
      version: {{ .Values.kubernetesVersion | quote }}
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: K0sWorkerConfigTemplate
          name: {{ .Values.clusterName }}-worker-config
      infrastructureRef:
        apiVersion: infrastructure.e2enetworks.com/v1beta1
        kind: E2EMachineTemplate
        name: {{ .Values.clusterName }}-md-0
