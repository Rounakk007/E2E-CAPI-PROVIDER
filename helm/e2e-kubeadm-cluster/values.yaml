# Cluster identity
clusterName: my-e2e-cluster
namespace: kcm-system

# Kubernetes version (used for MachineDeployment spec.template.spec.version)
kubernetesVersion: v1.33.10

# k0s version map: maps Kubernetes major.minor to the latest k0s release for
# that minor.  Used when k0s.version is empty (the default).  Keep this list
# up-to-date as new k0s patch releases are published.
k0sVersionMap:
  "1.32": "v1.32.13+k0s.0"
  "1.33": "v1.33.10+k0s.0"
  "1.34": "v1.34.6+k0s.0"
  "1.35": "v1.35.3+k0s.0"

# k0s configuration
k0s:
  # Full k0s version string override (e.g. "v1.33.10+k0s.0").
  # Leave empty to auto-select from k0sVersionMap based on kubernetesVersion.
  version: ""
  network:
    # Built-in CNI: calico (default), kuberouter. Use 'custom' for external CNI.
    provider: calico

# Labels applied to the Cluster object (used by MultiClusterService selectors)
clusterLabels: {}

# Control plane configuration
controlPlane:
  count: 1
  plan: C3.8GB
  image: Ubuntu-24.04-Distro
  location: Delhi
  enablePublicIP: true

# Worker node configuration
worker:
  count: 1
  plan: C2-12GB
  image: Ubuntu-24.04-Distro
  location: Delhi
  enablePublicIP: true

# E2E Cloud region and network
region: ncr
location: Delhi
network:
  vpcID: ""
  podCIDR: 10.244.0.0/16
  serviceCIDR: 10.96.0.0/12

# Load balancer configuration
loadBalancer:
  securityGroupID: 0

# SSH public keys to inject into all nodes
sshKeys: []
