---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cape2e-leader-election-role
  namespace: cape2e-system
  labels:
    cluster.x-k8s.io/provider: infrastructure-e2e
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
