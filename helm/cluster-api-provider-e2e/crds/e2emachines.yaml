apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: e2emachines.infrastructure.e2enetworks.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  labels:
    cluster.x-k8s.io/v1beta1: v1beta1
spec:
  group: infrastructure.e2enetworks.com
  names:
    kind: E2EMachine
    listKind: E2EMachineList
    plural: e2emachines
    singular: e2emachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .spec.providerID
      name: ProviderID
      type: string
    - jsonPath: .status.instanceStatus
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: E2EMachine is the Schema for the e2emachines API.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: E2EMachineSpec defines the desired state of E2EMachine.
            properties:
              enableBackup:
                description: EnableBackup enables automated backups for the node.
                type: boolean
              enableIPv6:
                description: EnableIPv6 enables IPv6 networking for the node.
                type: boolean
              enablePublicIP:
                description: EnablePublicIP assigns a public IP address to the node.
                type: boolean
              image:
                description: Image is the OS image name (e.g., "Ubuntu-24.04-Distro").
                type: string
              location:
                description: Location is the E2E Cloud location query parameter (e.g., "Delhi").
                type: string
              plan:
                description: Plan is the compute plan/SKU (e.g., "C3.8GB", "C2-12GB").
                type: string
              providerID:
                description: 'ProviderID is the unique identifier for this machine in the format: e2e://<region>/<node-id>'
                type: string
              region:
                description: Region is the E2E Cloud region. Defaults to the cluster region if not set.
                type: string
              securityGroupIDs:
                description: SecurityGroupIDs is the list of security group IDs to attach to this node.
                items:
                  type: integer
                type: array
              sshKeys:
                description: SSHKeys is the list of SSH public keys to inject into the node.
                items:
                  type: string
                type: array
              vpcID:
                description: VPCID is the VPC in which to place the node. Defaults to the cluster VPC if not set.
                type: string
            required:
            - image
            - plan
            type: object
          status:
            description: E2EMachineStatus defines the observed state of E2EMachine.
            properties:
              addresses:
                description: Addresses contains the associated addresses for the machine.
                items:
                  description: MachineAddress contains information for the node's address.
                  properties:
                    address:
                      description: The machine address.
                      type: string
                    type:
                      description: 'Machine address type, one of: Hostname, ExternalIP, InternalIP, ExternalDNS, InternalDNS.'
                      type: string
                  required:
                  - address
                  - type
                  type: object
                type: array
              bootstrapped:
                description: Bootstrapped is true when the bootstrap script has been executed successfully.
                type: boolean
              conditions:
                description: Conditions defines current service state of the E2EMachine.
                items:
                  description: Condition defines an observation of a Cluster API resource operational state.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    severity:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - status
                  - type
                  type: object
                type: array
              failureMessage:
                description: FailureMessage will be set in case of a terminal problem reconciling the E2EMachine.
                type: string
              failureReason:
                description: FailureReason will be set in case of a terminal problem reconciling the E2EMachine.
                type: string
              instanceID:
                description: InstanceID is the E2E Cloud node ID assigned to this machine.
                type: integer
              instanceStatus:
                description: InstanceStatus is the current status string from the E2E Cloud API.
                type: string
              ready:
                description: Ready denotes that the machine infrastructure is fully provisioned and the node has joined the cluster.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
