---
# ClusterTemplate defines a reusable cluster blueprint backed by our e2e-k0s-cluster Helm chart.
# Users reference this template by name in their ClusterDeployment objects.
apiVersion: k0rdent.mirantis.com/v1beta1
kind: ClusterTemplate
metadata:
  name: e2e-k0s-0-2-0
  namespace: kcm-system
spec:
  # Kubernetes version this template targets
  k8sVersion: "1.33.10"
  providers:
    - bootstrap-k0sproject-k0smotron
    - control-plane-k0sproject-k0smotron
    - infrastructure-e2e
  providerContracts:
    bootstrap-k0sproject-k0smotron: v1beta1
    control-plane-k0sproject-k0smotron: v1beta1
    infrastructure-e2e: v1beta1
  helm:
    chartSpec:
      chart: e2e-k0s-cluster
      version: 0.2.0
      interval: 10m0s
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: e2e-provider-charts
