---
# The credentials Secret must be created BEFORE applying this Credential object.
# Run:
#   kubectl create secret generic e2e-cloud-credentials \
#     --namespace kcm-system \
#     --from-literal=api-key=<your-api-key> \
#     --from-literal=auth-token=<your-auth-token> \
#     --from-literal=project-id=<your-project-id>
#
# Note: The E2E provider reads credentials from the controller pod's env vars
# (via the Secret mounted in the provider Helm chart). This Credential object
# is a k0rdent reference object for access management purposes.
apiVersion: k0rdent.mirantis.com/v1beta1
kind: Credential
metadata:
  name: e2e-credential
  namespace: kcm-system
spec:
  description: "E2E Networks Cloud API credentials"
  identityRef:
    apiVersion: v1
    kind: Secret
    name: e2e-cloud-credentials
    namespace: kcm-system
